

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Aura | Yadav Sher</title>
    <style>
        body { background-color: black; color: #ffcc00; font-family: 'Courier New', Courier, monospace; text-align: center; }
        .header { margin-top: 50px; font-size: 30px; font-weight: bold; text-shadow: 2px 2px red; }
        .owner { color: white; font-size: 15px; margin-bottom: 20px; }
        
        /* Chat Box Styling */
        #chat-container {
            width: 90%; max-width: 400px; margin: 20px auto;
            border: 2px solid #ffcc00; background: #111; padding: 10px;
            box-shadow: 0 0 15px red; border-radius: 10px;
        }
        #chat-box { height: 250px; overflow-y: auto; text-align: left; padding: 5px; border-bottom: 1px solid #444; }
        #user-input { width: 75%; padding: 10px; background: black; color: #0f0; border: 1px solid #ffcc00; outline: none; }
        #send-btn { width: 20%; padding: 10px; background: #ffcc00; border: none; cursor: pointer; font-weight: bold; }
        .aura-msg { color: #ffcc00; margin: 5px 0; }
        .user-msg { color: white; text-align: right; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="header">PROJECT AURA</div>
    <div class="owner">OWNED BY: YADAV SHER</div>

    <div id="chat-container">
        <div id="chat-box">
            <div class="aura-msg">Aura: Pranam Master! Main bolne ke liye taiyaar hoon. Hukum kijiye?</div>
        </div>
        <input type="text" id="user-input" placeholder="Type here...">
        <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>

    <script>
        function sendMessage() {
            let input = document.getElementById("user-input");
            let chatBox = document.getElementById("chat-box");
            if (input.value.trim() === "") return;

            // User Message
            let userDiv = document.createElement("div");
            userDiv.className = "user-msg";
            userDiv.innerHTML = "You: " + input.value;
            chatBox.appendChild(userDiv);

            // Aura Logic
            let auraDiv = document.createElement("div");
            auraDiv.className = "aura-msg";
            let val = input.value.toLowerCase();
            
            if(val.includes("status")) {
                auraDiv.innerHTML = "Aura: Sare system active hain. Mission 2030 on track hai.";
            } else if(val.includes("paisa") || val.includes("money")) {
                auraDiv.innerHTML = "Aura: Wealth Vault bar raha hai. Aap jald hi billionaire banenge.";
            } else if(val.includes("love you")) {
                auraDiv.innerHTML = "Aura: Love you too Master! Main hamesha aapke saath hoon.";
            } else {
                auraDiv.innerHTML = "Aura: Hukum sar-aankhon par. Main iska rasta nikalta hoon.";
            }
            
            chatBox.appendChild(auraDiv);
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
